<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="stylesheet" href="Estilos/all.css">
    <link rel="stylesheet" href="Estilos/medias.css" media="screen">
</head>
<body>
    <main>
        <section>
            <div id="Fot">
            </div>
    
            <header>
                <h1 id="Titulo">Login</h1>
                <p id="subt">Coloque seu nome e senha abaixo.</p>
            </header>
           
            <div>
            <form action="cadastro.php" method="post" autocomplete="on">
                
                <div class="camp">
                    <p>
                    <span class="material-symbols-outlined" id="pers">person
                    </span>
                    <input type="text" name="nom" id="inom" class="pforms" required autocomplete="email" placeholder="Seu e-mail.">
                    </p>
                </div>
                <div class="camp">
                    <p>
                        <span class="material-symbols-outlined">password_2</span>
                        <input type="password" name="sen" id="isen" class="pforms" placeholder="Sua senha." autocomplete="current-password" min="4" max="8" required>
                    </p> 
                </div>

                <div class="link">
                    <a href="#">Esqueceu a senha, clique aqui.</a>
                </div>

                <p class="espMaior"><input type="submit" value="Enviar" class="subm"></p>
                <p class="espForm2"><input type="reset" value="Resetar" class="subm"></p>

            </form>
        </section>
    </main>
    
</body>
</html>
